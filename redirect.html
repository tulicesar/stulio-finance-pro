<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirigiendo...</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
            background: #495057; color: white;
        }
        .msg { text-align: center; }
        .spinner { 
            width: 40px; height: 40px; border: 4px solid #fca311;
            border-top-color: transparent; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="msg">
    <div class="spinner"></div>
    <p>Redirigiendo a My FinanceApp...</p>
</div>
<script>
    var APP_URL = "https://stulio-finance-pro-7xa6pgb2ttmkdper9lwqqo.streamlit.app";
    var hash = window.location.hash;
    
    if (hash && hash.indexOf('access_token') !== -1) {
        var pairs = hash.replace('#', '').split('&');
        var token = '';
        var type  = '';
        for (var i = 0; i < pairs.length; i++) {
            var kv = pairs[i].split('=');
            if (kv[0] === 'access_token') token = decodeURIComponent(kv[1]);
            if (kv[0] === 'type')         type  = decodeURIComponent(kv[1]);
        }
        if (token && type === 'recovery') {
            var refreshToken = '';
            for (var j = 0; j < pairs.length; j++) {
                var kv2 = pairs[j].split('=');
                if (kv2[0] === 'refresh_token') { refreshToken = decodeURIComponent(kv2[1]); break; }
            }
            var redirectUrl = APP_URL + '?recovery_token=' + encodeURIComponent(token);
            if (refreshToken) redirectUrl += '&refresh_token=' + encodeURIComponent(refreshToken);
            window.location.href = redirectUrl;
        } else {
            window.location.href = APP_URL;
        }
    } else {
        window.location.href = APP_URL;
    }
</script>
</body>
</html>
